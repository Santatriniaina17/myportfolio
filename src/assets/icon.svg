<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SN icon">
  <defs>
    <!-- Dégradé principal (violet -> rose) -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E5AFF"></stop>
      <stop offset="55%" stop-color="#9758FF"></stop>
      <stop offset="100%" stop-color="#FF4D9E"></stop>
    </linearGradient>

    <!-- Légère lueur / ombre portée -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.18"></feDropShadow>
    </filter>

    <!-- Gloss pour léger brillant -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"></stop>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <!-- Forme principale: carré aux coins arrondis (pour ressembler à une app icon) -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20" fill="url(#g1)" filter="url(#shadow)"></rect>

  <!-- Gloss en surimpression -->
  <rect x="12" y="12" width="104" height="52" rx="16" ry="16" fill="url(#gloss)" opacity="0.9"></rect>

  <!-- Sigle SN centré -->
  <text x="50%" y="62%" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="800" font-size="52" fill="#FFFFFF" letter-spacing="-1">
    SN
  </text>

  <!-- Optionnel: léger contour translucide pour lisibilité -->
  <text x="50%" y="62%" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="800" font-size="52" fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="2" letter-spacing="-1">
    SN
  </text>
</svg>
